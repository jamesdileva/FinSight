<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>FinSight</title>

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Arial;
  padding: 20px;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

/* GRID */
.dashboard {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* LEFT SIDE */
.left-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* RIGHT SIDE */
.right-column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* CARDS */
.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 10px;
  transition: all 0.2s ease-in-out;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.4);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
  background: #334155;
  color: white;
}

/* BUTTONS */
button {
  background: #6366f1;
  color: white;
  padding: 6px 12px;
  margin: 4px 4px 4px 0;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.logout-btn { background: #ef4444; }
.reset-btn { background: #3b82f6; }

/* QUICK BUTTONS */
.quick-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* WATCHLIST */
#stockList {
  list-style: none;
  padding: 0;
}

#stockList li {
  display: flex;
  justify-content: space-between;
  background: #334155;
  padding: 6px;
  border-radius: 6px;
  margin-bottom: 5px;
}

.delete-btn {
  background: #ef4444;
}

/* WATCHLIST GRID */
#multiStockContainer {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* CHARTS */
canvas {
  max-height: 220px;
}
</style>
</head>

<body>

<div class="header">
  <h1>FinSight</h1>

  <div>
    <form action="/logout">
      <button class="logout-btn">Logout</button>
    </form>

    <form action="/reset" method="POST" onsubmit="pauseRefresh()">
      <button type="submit" class="reset-btn">Reset</button>
    </form>
  </div>
</div>

<!-- ✅ CATEGORY DROPDOWN (DYNAMIC NOW) -->
<select id="categoryFilter">
  <option value="">All</option>
</select>

<div class="dashboard">

<!-- LEFT -->
<div class="left-column">

<div class="card">
<h2>Monthly Trend</h2>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h2>Category Breakdown</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Add Transaction</h2>
<form action="/add" method="POST">
  <input name="amount" placeholder="Amount" required>
  <input name="category" placeholder="Category" required>
  <input name="date" type="date" required>
  <input name="description" placeholder="Description">
  <button>Add</button>
</form>
</div>

<div class="card">
<h2>Upload CSV</h2>
<form action="/upload" method="POST" enctype="multipart/form-data">
  <input type="file" name="file" required>
  <button>Upload</button>
</form>
</div>

</div>

<!-- RIGHT -->
<div class="right-column">

<div class="card">
<h2>Insights</h2>
<ul id="insightsList"></ul>
</div>

<div class="card">
<h2>Stock Tracker</h2>

<input id="stockInput" placeholder="Enter ticker">
<button onclick="loadStock()">Track</button>

<div class="quick-buttons">
<button onclick="quickStock('AAPL')">Apple</button>
<button onclick="quickStock('TSLA')">Tesla</button>
<button onclick="quickStock('GOOGL')">Google</button>
<button onclick="quickStock('AMZN')">Amazon</button>
</div>

<select id="stockDropdown" onchange="selectStock()">
<option value="">Select stock</option>
<option value="NVDA">Nvidia</option>
<option value="META">Meta</option>
<option value="NFLX">Netflix</option>
</select>

<div id="stockContainer"></div>
</div>

<div class="card">
<h2>Watchlist</h2>

<form action="/add-stock" method="POST">
<select name="ticker" required>
  <option value="">Add stock</option>
  <option value="AAPL">Apple</option>
  <option value="TSLA">Tesla</option>
  <option value="GOOGL">Google</option>
  <option value="AMZN">Amazon</option>
  <option value="NVDA">Nvidia</option>
  <option value="META">Meta</option>
  <option value="NFLX">Netflix</option>
</select>
<button>Add</button>
</form>

<ul id="stockList"></ul>
</div>

</div>
</div>

<!-- WATCHLIST CHARTS -->
<div class="card" style="margin-top:20px;">
<h2>Watchlist Charts</h2>
<div id="multiStockContainer"></div>
</div>

<script>
let pieChart;
let lineChart;

/* ✅ LOAD CATEGORIES (FIX #1) */
function loadCategories() {
  fetch("/categories")
    .then(res => res.json())
    .then(data => {
      const dropdown = document.getElementById("categoryFilter");
      dropdown.innerHTML = '<option value="">All</option>';

      data.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        dropdown.appendChild(option);
      });
    });
}

/* STOCK */
function selectStock() {
  const ticker = document.getElementById("stockDropdown").value;
  if (!ticker) return;
  document.getElementById("stockInput").value = ticker;
  loadStock();
}

function quickStock(t) {
  document.getElementById("stockInput").value = t;
  loadStock();
}

function loadStock() {
  const t = document.getElementById("stockInput").value;
  if (!t) return;

  document.getElementById("stockContainer").innerHTML =
    `<iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=${t}&theme=dark"
     width="100%" height="250"></iframe>`;
}

/* WATCHLIST */
function loadWatchlist() {
  fetch("/get-stocks")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("stockList");
      const container = document.getElementById("multiStockContainer");

      list.innerHTML = "";
      container.innerHTML = "";

      data.forEach(stock => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${stock.ticker}
          <form method="POST" action="/delete-stock">
            <input type="hidden" name="id" value="${stock.id}">
            <button class="delete-btn">✕</button>
          </form>
        `;
        list.appendChild(li);

        const chart = document.createElement("div");
        chart.innerHTML = `
          <h4>${stock.ticker}</h4>
          <iframe src="https://widget.finnhub.io/widgets/stocks/chart?symbol=${stock.ticker}&theme=dark"
          width="100%" height="180"></iframe>
        `;
        container.appendChild(chart);
      });
    });
}

/* ✅ CHARTS + INSIGHTS FIX */
function loadCharts() {
  const category = document.getElementById("categoryFilter").value;

  // ---------------- PIE CHART ----------------
  fetch(`/chart-data?category=${category}`)
  .then(res => res.json())
  .then(data => {

    let labels;
    let values;

    // ✅ IF SINGLE CATEGORY SELECTED
    if (category) {
      const selectedValue = Object.values(data)[0] || 0;

      // get ALL data to compare against
      fetch("/chart-data")
        .then(res => res.json())
        .then(allData => {
          const total = Object.values(allData).reduce((a, b) => a + b, 0);
          const other = total - selectedValue;

          labels = [category, "Other"];
          values = [selectedValue, other];

          if (pieChart) pieChart.destroy();

          pieChart = new Chart(document.getElementById("chart"), {
            type: "pie",
            data: {
              labels: labels,
              datasets: [{ data: values }]
            },
            options: {
              animation: false
            }
          });
        });

    } else {
      // ✅ NORMAL ALL CATEGORY VIEW
      labels = Object.keys(data);
      values = Object.values(data);

      if (pieChart) pieChart.destroy();

      pieChart = new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
          labels: labels,
          datasets: [{ data: values }]
        },
        options: {
          animation: false
        }
      });
    }
  });

  // ---------------- LINE CHART ----------------
  fetch(`/monthly-data?category=${category}`)
    .then(res => res.json())
    .then(data => {
      if (lineChart) lineChart.destroy();

      lineChart = new Chart(document.getElementById("monthlyChart"), {
        type: "line",
        data: {
          labels: Object.keys(data),
          datasets: [{
            label: "Monthly Spending",
            data: Object.values(data),
            tension: 0.3
          }]
        },
        options: {
          animation: false   // ✅ removes flicker effect
        }
      });
    });

  // ---------------- INSIGHTS (UNCHANGED) ----------------
  fetch(`/insights?category=${category}`)
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("insightsList");
      list.innerHTML = "";

      data.forEach(i => {
        const li = document.createElement("li");
        li.textContent = i;
        list.appendChild(li);
      });
    });
}

/* INIT */
window.onload = () => {
  loadCategories();   // ✅ NEW
  loadCharts();
  loadWatchlist();

  setInterval(loadCharts, 15000);
  setInterval(loadWatchlist, 30000);
};

/* ✅ EVENT LISTENER (SAFE POSITION) */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("categoryFilter").addEventListener("change", loadCharts);
});
</script>

</body>
</html>
