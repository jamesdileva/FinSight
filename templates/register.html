<!DOCTYPE html>
<html>
<head>
  <title>Register - FinSight</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input, button {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Register</h2>

  <form method="POST">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Create Account</button>
  </form>

  <p>Already have an account?</p>
  <a href="/login">Login</a>
</div>

</body>
</html>
